name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build wheels and release
    runs-on: ubuntu-latest

    steps:
      - name: Check version input matches code
        run: |
          echo "Version input: ${{ github.event.inputs.version }}"
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: Version must start with 'v' followed by semver (e.g. v0.1.0)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build wheel and sdist
        run: |
          python -m build --outdir dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "portapkg ${{ github.event.inputs.version }}"
          body: |
            portapkg ${{ github.event.inputs.version }}

            ## Installation

            ```bash
            pip install portapkg==${{ github.event.inputs.version }}
            # or use the standalone:
            # python portapkg.py install <package>
            ```

            ## What's Changed

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.event.inputs.version }}) for details.

          files: dist/*
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
