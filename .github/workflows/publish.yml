name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build wheels and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "Version tag: $TAG (semver: $VER)"

      - name: Validate version tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: Version must start with 'v' followed by semver (e.g. v0.1.0). Got: $TAG"
            exit 1
          fi

      - name: Verify version matches code
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VER="${TAG#v}"
          PKG_VER=$(grep -oP '__version__\s*=\s*"\K[^"]+' portapkg/__init__.py)
          if [[ "$VER" != "$PKG_VER" ]]; then
            echo "ERROR: Tag version '$VER' does not match portapkg.__version__ '$PKG_VER'"
            exit 1
          fi
          echo "Version match: $VER"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install portapkg
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          python -m pytest --cov=portapkg --cov-report=term-missing

      - name: Install build tools
        run: |
          pip install build wheel

      - name: Build wheel and sdist
        run: |
          python -m build --outdir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "portapkg ${{ steps.version.outputs.tag }}"
          body: |
            portapkg ${{ steps.version.outputs.tag }}

            ## Installation

            ```bash
            pip install portapkg==${{ steps.version.outputs.ver }}
            ```

            ## What's Changed

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}) for details.

          files: dist/*
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
