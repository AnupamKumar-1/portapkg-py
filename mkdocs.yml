site_name: portapkg
site_description: Portable, offline-friendly Python package bundler and installer
site_url: https://abduznik.github.io/portapkg-py/
repo_url: https://github.com/abduznik/portapkg-py
repo_name: abduznik/portapkg-py
edit_uri: blob/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Outfit
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - header.autohide
    - announce.dismiss

nav:
  - Home: index.md
  - Usage:
    - Getting started: usage.md
    - CLI reference: cli.md
    - Standalone script: standalone.md
    - Export bundles: export.md
  - Reference:
    - Configuration: configuration.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abduznik/portapkg-py
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/portapkg/
    - icon: fontawesome/solid/file-code
      link: https://github.com/abduznik/portapkg-py/blob/main/portapkg.py
  generator: false
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

copyright: |
  Built with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank">Material for MkDocs</a> &mdash;
  <a href="#__consent">Change cookie settings</a>
