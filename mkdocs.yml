site_name: portapkg
site_description: Portable, offline-friendly Python package bundler and installer
site_url: https://abduznik.github.io/portapkg-py/
repo_url: https://github.com/abduznik/portapkg-py
repo_name: abduznik/portapkg-py
edit_uri: blob/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Usage:
    - Getting started: usage.md
    - CLI reference: cli.md
    - Standalone script: standalone.md
  - Reference:
    - Configuration: configuration.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abduznik/portapkg-py

copyright: Copyright &copy; 2026 portapkg
